name: Check marketplace consistency

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'skills/**'
      - 'scripts/check-marketplace.mjs'
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'skills/**'
      - 'scripts/check-marketplace.mjs'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Walidator marketplace.json vs ./skills/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run check-marketplace validator
        run: node scripts/check-marketplace.mjs

      - name: Summary
        if: success()
        run: echo "All marketplace.json entries match ./skills/ folders."
